sources:
  hz9m:
    description: FDB IFS/FESOM lowres run with tco79/CORE2 native grids 
      regridded to Healpix
    driver: yaml_file_cat
    args:
      path: '{{CATALOG_DIR}}/hz9m.yaml'
    metadata:
      expid: hz9m
      resolution_atm: tco79
      resolution_oce: CORE2
      forcing: historical
      start: 2020
  hz9o:
    description: FDB IFS/FESOM developer run with tco1279/NG5 native grids 
      regridded to Healpix
    driver: yaml_file_cat
    args:
      path: '{{CATALOG_DIR}}/hz9o.yaml'
    metadata:
      expid: hz9o
      resolution_atm: tco1279
      resolution_oce: NG5
      forcing: historical
      start: 2020
  hzfy:
    description: FDB IFS/FESOM test run with tco2559/NG5 native grids regridded 
      to Healpix
    metadata:
      expid: hzfy
      resolution_atm: tco2559
      resolution_oce: NG5
      forcing: historical
      start: '2020'
      dashboard:
        menu: hzfy
        resolution_id: HR
        note: null
    driver: yaml_file_cat
    args:
      path: '{{CATALOG_DIR}}/hzfy.yaml'
  a280:
    description: FDB IFS/NEMO historical run
    metadata:
      expid: a280
      resolution_atm: tco79
      resolution_oce: CORE2
      forcing: control
      start: '1990'
      dashboard:
        menu: a280
        resolution_id: LR
        note: null
    driver: yaml_file_cat
    args:
      path: '{{CATALOG_DIR}}/a280.yaml'
  t0od:
    description: '"ifs-fesom t0od 1990, grids: tco79 CORE2"'
    metadata:
      author: shafeequ1
      maintainer: not specified
      machine: lumi
      expid: t0od
      resolution_atm: tco79
      resolution_oce: CORE2
      forcing: control
      start: '1990'
      dashboard:
        menu: t0od
        resolution_id: LR
        note: null
    driver: yaml_file_cat
    args:
      path: '{{CATALOG_DIR}}/t0od.yaml'
