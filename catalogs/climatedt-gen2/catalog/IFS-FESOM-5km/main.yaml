      expid: '0001'
      expver: o00r
      resolution_atm: tco2559
      resolution_oce: NG5
      forcing: control
      start: '1990'
      dashboard:
        menu: control-1990
        resolution_id: HR
        note: 'first five years are part of the e-suite'
