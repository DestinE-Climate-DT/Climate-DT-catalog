      forcing: historical
      start: '1990'
      machine: mn5
      author: 'Cheng You'
      dashboard:
        menu: baseline-hist
        resolution_id: HR
        note: ''
    driver: yaml_file_cat
    args:
      path: '{{CATALOG_DIR}}/baseline-hist.yaml'
  projections-ssp370:
    description: '"IFS-NEMO ssp370 2015, grids: tco2559 eORCA12"'
