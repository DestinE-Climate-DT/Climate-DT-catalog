sources:
  baseline-cont:
      description: '"IFS-NEMO control 1990, grids: tco2559 eORCA12"'
      metadata:
        expid: '0001'
        resolution_atm: tco2559
        resolution_oce: eORCA12
        forcing: control
        start: '1990'
        machine: mn5
        dashboard:
          menu: baseline-cont
          resolution_id: HR
          note: 'The first 5 years were run in the e25.1 suite'
