sources:
  aqua-timeseries-monthly:
    driver: netcdf
    description: AQUA analysis timeseries 
    # list of variables: ['2t', 'avg_tos', 'avg_siconc', 'hcc', 'lcc', 'mcc', 'msl', 'mslhf', 'msnlwrf', 'msnswrf', 'msshf', 'mtnlwrf', 'mtnlwrf+mtnswrf', 'mtnswrf', 'tcc']
    args:
      urlpath: '{{ OUTPUT_AQUA_PATH }}/IFS-FESOM/historical-1990/global_time_series/netcdf/global_time_series_timeseries_*_IFS-FESOM_historical-1990_mon.nc'
      xarray_kwargs:
        #decode_times: true
        combine: 'nested'
        compat: 'override'
    metadata:
      source_grid_name: False

  aqua-timeseries-annual:
    driver: netcdf
    description: AQUA analysis timeseries
    # list of variables: ['2t', 'avg_tos', 'avg_siconc', 'hcc', 'lcc', 'mcc', 'msl', 'mslhf', 'msnlwrf', 'msnswrf', 'msshf', 'mtnlwrf', 'mtnlwrf+mtnswrf', 'mtnswrf', 'tcc'] 
    args:
      urlpath: '{{ OUTPUT_AQUA_PATH }}/IFS-FESOM/historical-1990/global_time_series/netcdf/global_time_series_timeseries_*_IFS-FESOM_historical-1990_ann.nc' 
      xarray_kwargs:
        #decode_times: true
        combine: 'nested'
        compat: 'override'
    metadata:
      source_grid_name: False

  aqua-atmglobalmean:
    driver: netcdf
    description: AQUA analysis atm global mean
    # list of variables: ['2t', 'msl'] 
    args:
      urlpath: '{{ OUTPUT_AQUA_PATH }}/IFS-FESOM/historical-1990/atmglobalmean/netcdf/atmglobalmean.statistics_maps.*.IFS-FESOM_historical-1990.nc'
      xarray_kwargs:
        #decode_times: true
        combine: 'nested'
        compat: 'override'
    metadata:
      source_grid_name: False

  aqua-zonalmean:
    driver: netcdf
    description: AQUA analysis ocean3d_drift zonal diagnostics
    # list of variables: ['so','thetao']
    args:
      urlpath: 
        - '{{ OUTPUT_AQUA_PATH }}/IFS-FESOM/historical-1990/ocean3d_drift/netcdf/IFS-FESOM-historical-1990-lra-r100-monthly_zonal_mean_trend_{{ region }}_ocean.nc'
      xarray_kwargs:
        #decode_times: true
        combine: 'nested'
        compat: 'override'
    parameters:
      region:
        allowed: ['arctic','atlantic','global','indian','pacific','southern']
        description: AQUA analysis regional ocean3d_drift zonal diagnostics
        type: str
        default: 'atlantic'
    metadata:
      source_grid_name: False
